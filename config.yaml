agent:
  name: droidrun
  max_steps: 15
  reasoning: false
  streaming: true
  after_sleep_action: 1.0
  wait_for_stable_ui: 0.3
  use_normalized_coordinates: false
  fast_agent:
    vision: false
    codeact: false
    parallel_tools: true
    system_prompt: config/prompts/codeact/tools_system.jinja2
    user_prompt: config/prompts/codeact/tools_user.jinja2
    safe_execution: false
    execution_timeout: 50.0
  manager:
    vision: false
    system_prompt: config/prompts/manager/system.jinja2
    stateless: false
  executor:
    vision: false
    system_prompt: config/prompts/executor/system.jinja2
  scripter:
    enabled: true
    max_steps: 10
    execution_timeout: 30.0
    system_prompt: config/prompts/scripter/system.jinja2
    safe_execution: false
  app_cards:
    enabled: true
    mode: local
    app_cards_dir: config/app_cards
    server_url: null
    server_timeout: 2.0
    server_max_retries: 2
llm_profiles:
  manager:
    provider: GoogleGenAI
    model: gemini-2.5-pro
    temperature: 0.2
    base_url: null
    api_base: null
    kwargs: {}
  executor:
    provider: GoogleGenAI
    model: gemini-2.5-pro
    temperature: 0.1
    base_url: null
    api_base: null
    kwargs: {}
  fast_agent:
    provider: GoogleGenAI
    model: gemini-2.5-pro
    temperature: 0.2
    base_url: null
    api_base: null
    kwargs: {}
  text_manipulator:
    provider: GoogleGenAI
    model: gemini-2.5-pro
    temperature: 0.3
    base_url: null
    api_base: null
    kwargs: {}
  app_opener:
    provider: GoogleGenAI
    model: gemini-2.5-pro
    temperature: 0.0
    base_url: null
    api_base: null
    kwargs: {}
  scripter:
    provider: GoogleGenAI
    model: gemini-2.5-flash
    temperature: 0.1
    base_url: null
    api_base: null
    kwargs: {}
  structured_output:
    provider: GoogleGenAI
    model: gemini-2.5-flash
    temperature: 0.0
    base_url: null
    api_base: null
    kwargs: {}
device:
  serial: null
  use_tcp: false
  platform: android
  auto_setup: true
telemetry:
  enabled: true
tracing:
  enabled: false
  provider: phoenix
  langfuse_screenshots: false
  langfuse_secret_key: ''
  langfuse_public_key: ''
  langfuse_host: ''
  langfuse_user_id: anonymous
  langfuse_session_id: ''
logging:
  debug: false
  save_trajectory: none
  trajectory_path: trajectories
  rich_text: false
  trajectory_gifs: true
tools:
  disabled_tools:
  - click_at
  - click_area
  - long_press_at
  stealth: false
credentials:
  enabled: false
  file_path: config/credentials.yaml
safe_execution:
  allow_all_imports: false
  allowed_modules: []
  blocked_modules: []
  allow_all_builtins: false
  allowed_builtins: []
  blocked_builtins: []
external_agents: {}
mcp:
  enabled: false
  servers: {}
_version: 3
